<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Post — My Personal Blog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
<style>
  .page-header {
    background: var(--color-dark);
    padding: 160px 0 70px;
    text-align: center;
  }
  .page-header h1 {
    font-family: var(--font-display);
    color: #fff;
    font-size: 2.4rem;
    max-width: 760px;
    margin: 0 auto;
  }
  .page-header .post-date {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    margin-top: 14px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .post-body {
    max-width: 700px;
    margin: 70px auto 110px;
    font-size: 16.5px;
    line-height: 1.8;
    color: var(--color-text);
  }
  .post-body h2 {
    font-family: var(--font-display);
    font-size: 1.5rem;
    margin: 40px 0 16px;
  }
  .post-body p { margin-bottom: 22px; }
  .post-body img { margin: 30px 0; }
  .back-link {
    display: inline-block;
    margin-bottom: 30px;
    font-size: 13px;
    text-decoration: underline;
    color: rgba(255,255,255,0.8);
  }
</style>
</head>
<body>

<header class="site-header" style="position:relative;background:var(--color-dark);">
  <div class="wrap">
    <div class="site-header__social">
      <a href="https://www.linkedin.com/in/pragyan-khadka-13657237a/" target="_blank" aria-label="LinkedIn">in</a>
      <a href="https://x.com/pragyankhd" target="_blank" aria-label="X">𝕏</a>
      <a href="https://www.instagram.com/pragyankhd/" target="_blank" aria-label="Instagram">◎</a>
    </div>
    <div class="site-header__brand">The<br><span>Quiet</span> Notebook</div>
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="blog.html">Blog</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<section class="page-header">
  <a href="blog.html" class="back-link">&larr; Back to blog</a>
  <h1 id="post-title">Loading…</h1>
  <div class="post-date" id="post-date"></div>
</section>

<div class="wrap">
  <div class="post-body" id="post-body">Loading post…</div>
</div>

<footer class="site-footer">
  <div class="wrap">
    <div>
      <h4>The Quiet Notebook</h4>
      <p>A personal blog.</p>
    </div>
    <div>
      <h4>Navigate</h4>
      <p><a href="index.html">Home</a> · <a href="blog.html">Blog</a> · <a href="about.html">About</a> · <a href="contact.html">Contact</a></p>
    </div>
    <div>
      <h4>Elsewhere</h4>
      <p><a href="https://www.linkedin.com/in/pragyan-khadka-13657237a/" target="_blank">LinkedIn</a> · <a href="https://x.com/pragyankhd" target="_blank">X</a> · <a href="https://www.instagram.com/pragyankhd/" target="_blank">Instagram</a></p>
    </div>
  </div>
</footer>

<script>
async function loadPost() {
  const params = new URLSearchParams(window.location.search);
  const postId = params.get('id');

  if (!postId) {
    document.getElementById('post-title').textContent = 'Post not found';
    document.getElementById('post-body').textContent = 'No post was specified.';
    return;
  }

  try {
    const manifestRes = await fetch('posts/posts.json');
    const posts = await manifestRes.json();
    const post = posts.find(p => p.id === postId);

    if (!post) {
      document.getElementById('post-title').textContent = 'Post not found';
      document.getElementById('post-body').textContent = 'This post does not exist.';
      return;
    }

    document.getElementById('page-title').textContent = post.title + ' — My Personal Blog';
    document.getElementById('post-title').textContent = post.title;
    document.getElementById('post-date').textContent = new Date(post.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

    const mdRes = await fetch('posts/' + post.id + '.md');
    const mdText = await mdRes.text();
    document.getElementById('post-body').innerHTML = marked.parse(mdText);

  } catch (err) {
    document.getElementById('post-title').textContent = 'Something went wrong';
    document.getElementById('post-body').textContent = 'There was an error loading this post.';
  }
}
loadPost();
</script>

</body>
</html>
