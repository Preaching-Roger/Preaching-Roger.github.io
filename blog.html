<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — {{ site.title }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<style>
  .page-header {
    background: var(--color-dark);
    padding: 160px 0 70px;
    text-align: center;
  }
  .page-header h1 {
    font-family: var(--font-display);
    color: #fff;
    font-size: 2.6rem;
  }
  .blog-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
    margin: 70px 0 110px;
  }
  @media (max-width: 900px) {
    .blog-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="site-header" style="position:relative;background:var(--color-dark);">
  <div class="wrap">
    <div class="site-header__social">
      <a href="https://www.linkedin.com/in/pragyan-khadka-13657237a/" target="_blank" aria-label="LinkedIn">in</a>
      <a href="https://x.com/pragyankhd" target="_blank" aria-label="X">𝕏</a>
      <a href="https://www.instagram.com/pragyankhd/" target="_blank" aria-label="Instagram">◎</a>
    </div>
    <div class="site-header__brand">The<br><span>Quiet</span> Notebook</div>
    <nav class="site-nav">
      <a href="/">Home</a>
      <a href="/blog.html">Blog</a>
      <a href="/about.html">About</a>
      <a href="/contact.html">Contact</a>
    </nav>
  </div>
</header>

<section class="page-header">
  <h1>Blog</h1>
</section>

<div class="wrap">
  <div class="blog-grid" id="blog-grid">
    <p style="color:var(--color-text-muted);">Loading posts…</p>
  </div>
</div>

<footer class="site-footer">
  <div class="wrap">
    <div>
      <h4>The Quiet Notebook</h4>
      <p>A personal blog.</p>
    </div>
    <div>
      <h4>Navigate</h4>
      <p><a href="/">Home</a> · <a href="/blog.html">Blog</a> · <a href="/about.html">About</a> · <a href="/contact.html">Contact</a></p>
    </div>
    <div>
      <h4>Elsewhere</h4>
      <p><a href="https://www.linkedin.com/in/pragyan-khadka-13657237a/" target="_blank">LinkedIn</a> · <a href="https://x.com/pragyankhd" target="_blank">X</a> · <a href="https://www.instagram.com/pragyankhd/" target="_blank">Instagram</a></p>
    </div>
  </div>
</footer>

<script>
async function loadBlogList() {
  const grid = document.getElementById('blog-grid');
  try {
    const res = await fetch('posts/posts.json');
    const posts = await res.json();
    posts.sort((a, b) => new Date(b.date) - new Date(a.date));

    if (posts.length === 0) {
      grid.innerHTML = '<p style="color:var(--color-text-muted);">No posts yet.</p>';
      return;
    }

    grid.innerHTML = posts.map(post => `
      <article class="post-card">
        <img src="${post.image}" alt="${post.title}">
        <h3><a href="post.html?id=${post.id}">${post.title}</a></h3>
        <p>${post.excerpt}</p>
      </article>
    `).join('');
  } catch (err) {
    grid.innerHTML = '<p style="color:var(--color-text-muted);">Could not load posts.</p>';
  }
}
loadBlogList();
</script>

</body>
</html>
